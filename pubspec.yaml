name: my_new_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

# =============== 🚀 运行时依赖 ===============
dependencies:
  logger: ^2.4.0   # ← 2.4.0 是2026年1月最新版，纯Dart、无native、删除零负担

  # Flutter 框架
  flutter:
    sdk: flutter
  
  # 🎨 UI 组件
  cupertino_icons: ^1.0.8
  
  # 🌐 网络相关
  http: ^1.1.0
  
  # 💾 本地存储
  shared_preferences: ^2.2.2
  path: ^1.9.0         # 路径处理（Isar 也用）
  
  # 📷 多媒体
  image_picker: ^1.1.2
  camera: ^0.10.6
  file_picker: ^10.3.8
  
  # 📁 文件路径
  path_provider: ^2.1.5
  
  # 🌍 国际化
  intl: ^0.20.2
  
  # 📊 数据解析
  xml: ^6.4.2
  
  # 📱 前台任务
  flutter_foreground_task: ^9.2.0
  


  
  # 🎨 UI 增强
  extended_image: ^10.0.1
  flutter_staggered_grid_view: ^0.7.0
  image: ^4.7.2
  
  # 🔔 通知
  flutter_local_notifications: ^17.2.3
  
  # 📤 分享
  share_plus: ^12.0.1
  
  # 🔐 权限
  permission_handler: ^11.3.1
  
  # =============== 📔 日记本核心依赖 ===============
  # 🎯 状态管理
  flutter_riverpod: ^2.5.1
  
  # 🆔 唯一标识
  uuid: ^4.3.0
  
  # ✍️ 富文本编辑器
  flutter_quill: ^11.5.0
  flutter_quill_extensions: ^11.0.0
  
  # 🎨 应用图标生成
  flutter_launcher_icons: ^0.14.4
  
  # =============== 📱 微信风格图片选择器 ===============
  wechat_assets_picker: ^10.1.0
  photo_manager: ^3.3.1
  palette_generator: ^0.3.3+7
  flutter_image_compress: ^2.4.0
  
  # 🏷️ Riverpod 注解
  riverpod_annotation: ^2.3.9

  # =============== Isar 数据库 ===============
  isar_community: ^3.2.0
  isar_community_flutter_libs: ^3.2.0

# =============== 🔧 开发依赖 ===============
dev_dependencies:
  # Flutter 测试框架
  flutter_test:
    sdk: flutter
  
  # 🔍 代码检查
  flutter_lints: ^6.0.0
  
  # 🔨 代码生成器
  build_runner: ^2.4.12
  
  # 🏷️ Riverpod 代码生成器
  riverpod_generator: ^2.3.9

  # Isar 代码生成器
  isar_community_generator: ^3.2.0
  rename: ^3.1.0

# =============== 🎨 Flutter 配置 ===============
flutter:
  uses-material-design: true

# =============== 🎯 应用图标配置 ===============
#flutter_launcher_icons:
 # android: true
 # ios: true
  #image_path: "assets/splash.png"          # 源图片路径（必须）
 # min_sdk_android: 21                      # 最低安卓版本
  
  # 可选优化配置
  #remove_alpha_ios: true                   # iOS 移除透明背景

# =============== 📝 迁移说明 ===============
# 
# ✅ 主要变更：
# 1. 移除：sqflite ^2.3.0（SQLite 数据库）
# 2. 新增：isar_community ^3.2.0 + isar_community_flutter_libs ^3.2.0 + isar_community_generator ^3.2.0（恢复 Isar，降到与 riverpod_generator 兼容的版本）
# 3. Riverpod 系列保持 2.x（与 Isar 兼容最稳）
# 4. 保留：path ^1.9.0（Isar 内部也用 path 处理文件路径）
# 
# ✅ 此回滚解决了依赖冲突：
#    - isar_community_generator 3.3.0 需要 build ^3.0.0，与 riverpod_generator ^2.3.9 冲突
#    - 降到 3.2.0 后 build ^2.4.x 兼容，pub get 成功
# 
# 🚀 执行命令：
# flutter clean
# flutter pub get
# dart run build_runner build --delete-conflicting-outputs
# 
# ==============================================
