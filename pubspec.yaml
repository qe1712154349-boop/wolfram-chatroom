name: my_new_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  shared_preferences: ^2.2.2
  image_picker: ^1.1.2
  camera: ^0.10.6
  path_provider: ^2.1.5
  path: ^1.9.0
  intl: ^0.20.2
  xml: ^6.4.2
  flutter_foreground_task: ^9.2.0
  flutter_native_splash: ^2.4.1
  extended_image: ^10.0.1
  flutter_staggered_grid_view: ^0.7.0
  image: ^4.7.2
  file_picker: ^10.3.8
  share_plus: ^12.0.1
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.3
  
  # === 日记本依赖 ===
  flutter_riverpod: ^2.5.1
  # 切换到社区维护版（2025-2026活跃更新）
  isar_community: ^3.3.0
  isar_community_flutter_libs: ^3.3.0
  uuid: ^4.3.0
  flutter_quill: ^11.5.0
  flutter_quill_extensions: ^11.0.0
  flutter_launcher_icons: ^0.14.4
  
  # === 微信风格图片选择器 ===
  wechat_assets_picker: ^10.1.0
  photo_manager: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  # 切换到社区版生成器
  isar_community_generator: ^3.3.0

flutter:
  uses-material-design: true
  
  # 👇 添加到这里（在 flutter: 部分后面）
  assets:
    - assets/splash.png  # 确保这个文件存在

flutter_launcher_icons: # ✅ 新增这个配置块
  android: true
  ios: true
  image_path: "assets/splash.png"
  adaptive_icon_background: "#FFD2DD"  # 粉色背景
  adaptive_icon_foreground: "assets/splash.png"
  min_sdk_android: 21