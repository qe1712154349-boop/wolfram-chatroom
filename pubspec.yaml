name: my_new_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

# =============== 🚀 运行时依赖 ===============
dependencies:
  # Flutter 框架
  flutter:
    sdk: flutter
  
  # 🎨 UI 组件
  cupertino_icons: ^1.0.8
  
  # 🌐 网络相关
  http: ^1.1.0
  
  # 💾 本地存储
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0      # ✅ SQLite 数据库（稳定无冲突）
  path: ^1.9.0         # 路径处理（配合 sqflite）
  
  # 📷 多媒体
  image_picker: ^1.1.2
  camera: ^0.10.6
  file_picker: ^10.3.8
  
  # 📁 文件路径
  path_provider: ^2.1.5
  
  # 🌍 国际化
  intl: ^0.20.2
  
  # 📊 数据解析
  xml: ^6.4.2
  
  # 📱 前台任务
  flutter_foreground_task: ^9.2.0
  
  # ✨ 启动屏
  flutter_native_splash: ^2.4.7
  
  # 🎨 UI 增强
  extended_image: ^10.0.1
  flutter_staggered_grid_view: ^0.7.0
  image: ^4.7.2
  
  # 🔔 通知
  flutter_local_notifications: ^17.2.3
  
  # 📤 分享
  share_plus: ^12.0.1
  
  # 🔐 权限
  permission_handler: ^11.3.1
  
  # =============== 📔 日记本核心依赖 ===============
  # 🎯 状态管理
  flutter_riverpod: ^2.6.1
  
  # 🆔 唯一标识
  uuid: ^4.3.0
  
  # ✍️ 富文本编辑器
  flutter_quill: ^11.5.0
  flutter_quill_extensions: ^11.0.0
  
  # 🎨 应用图标生成
  flutter_launcher_icons: ^0.14.4
  
  # =============== 📱 微信风格图片选择器 ===============
  wechat_assets_picker: ^10.1.0
  photo_manager: ^3.3.1
  palette_generator: ^0.3.3+7
  flutter_image_compress: ^2.4.0
  
  # 🏷️ Riverpod 注解
  riverpod_annotation: ^2.3.9

# =============== 🔧 开发依赖 ===============
dev_dependencies:
  # Flutter 测试框架
  flutter_test:
    sdk: flutter
  
  # 🔍 代码检查
  flutter_lints: ^6.0.0
  
  # 🔨 代码生成器
  build_runner: ^2.4.12
  
  # 🏷️ Riverpod 代码生成器
  riverpod_generator: ^2.3.9

# =============== 🎨 Flutter 配置 ===============
flutter:
  uses-material-design: true
  
  # 🖼️ 资源文件配置
  # splash.png 主要用于图标生成，如果启动屏也用，就取消注释
  assets:
    # - assets/splash.png  # ⚠️ 按需取消注释（如果启动屏需要）

# =============== 🎯 应用图标配置 ===============
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/splash.png"          # 源图片路径（必须）
  adaptive_icon_background: "#FFD2DD"      # 自适应图标背景色
  adaptive_icon_foreground: "assets/splash.png"  # 前景图标
  min_sdk_android: 21                      # 最低安卓版本
  
  # 可选优化配置
  remove_alpha_ios: true                   # iOS 移除透明背景
  generate_adaptive_icon_background: true  # 生成自适应背景

# =============== 📝 迁移说明 ===============
# 
# ✅ 主要变更：
# 1. 新增：sqflite ^2.3.0（SQLite 数据库，替换 Isar）
# 2. 移除：所有 isar_community 相关包
# 3. 保留：path ^1.9.0（sqflite 需要）
# 
# ✅ 图标处理：
# - flutter_launcher_icons 已配置并运行
# - 各尺寸图标已生成到平台目录
# - assets/splash.png 是源文件，用于重新生成
# 
# ✅ 后续操作：
# 1. 重写 database_helper.dart（SQLite 版本）
# 2. 修改 DiaryEntry 模型（添加 toMap/fromMap）
# 3. 更新 diary_provider.dart
# 4. 如需数据迁移，编写迁移脚本
# 
# 🚀 执行命令：
# flutter clean
# flutter pub get
# 
# ==============================================